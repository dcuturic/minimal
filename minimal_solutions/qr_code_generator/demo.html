<div class="qr-generator-container" style="width: 100%;">
    <style>
        .qr-input-group { margin-bottom: 1rem; }
        .qr-input-group label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem; }
        .qr-type-selector { margin-bottom: 1.5rem; }
        .qr-fields-container { display: none; }
        .qr-fields-container.active { display: block; }
        .qr-preview-box {
            background: var(--surface-color);
            border: 1px dashed var(--border-color);
            border-radius: 8px;
            padding: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 250px;
            margin-bottom: 1.5rem;
            position: relative;
        }
        .qr-controls { display: flex; gap: 1rem; justify-content: center; }
        .qr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        @media (max-width: 768px) { .qr-grid { grid-template-columns: 1fr; } }
    </style>

    <div class="qr-grid">
        <div class="qr-form-section">
            <div class="qr-input-group qr-type-selector">
                <label>Content Type</label>
                <select class="input-field" id="qr-type" onchange="switchQrType(this.value)">
                    <option value="text">Plain Text</option>
                    <option value="url">URL / Link</option>
                    <option value="wifi">WiFi Network</option>
                    <option value="contact">Contact (vCard)</option>
                </select>
            </div>

            <!-- Text Input -->
            <div id="fields-text" class="qr-fields-container active">
                <div class="qr-input-group">
                    <label>Text Content</label>
                    <textarea class="input-field" id="qr-text" rows="4" placeholder="Enter text to encode..."></textarea>
                </div>
            </div>

            <!-- URL Input -->
            <div id="fields-url" class="qr-fields-container">
                <div class="qr-input-group">
                    <label>URL</label>
                    <input type="url" class="input-field" id="qr-url" placeholder="https://example.com">
                </div>
            </div>

            <!-- WiFi Input -->
            <div id="fields-wifi" class="qr-fields-container">
                <div class="qr-input-group">
                    <label>Network Name (SSID)</label>
                    <input type="text" class="input-field" id="qr-wifi-ssid" placeholder="MyWiFiNetwork">
                </div>
                <div class="qr-input-group">
                    <label>Password</label>
                    <input type="password" class="input-field" id="qr-wifi-password" placeholder="••••••••">
                </div>
                <div class="qr-input-group">
                    <label>Encryption</label>
                    <select class="input-field" id="qr-wifi-encryption">
                        <option value="WPA">WPA/WPA2</option>
                        <option value="WEP">WEP</option>
                        <option value="nopass">None</option>
                    </select>
                </div>
            </div>

            <!-- Contact Input -->
            <div id="fields-contact" class="qr-fields-container">
                <div class="qr-input-group">
                    <label>Full Name</label>
                    <input type="text" class="input-field" id="qr-contact-name" placeholder="John Doe">
                </div>
                <div class="qr-input-group">
                    <label>Phone</label>
                    <input type="tel" class="input-field" id="qr-contact-phone" placeholder="+1 234 567 8900">
                </div>
                <div class="qr-input-group">
                    <label>Email</label>
                    <input type="email" class="input-field" id="qr-contact-email" placeholder="john@example.com">
                </div>
            </div>

            <button class="btn btn-primary" style="width: 100%; margin-top: 1rem;" onclick="generateQrCode(this)">
                Generate QR Code
            </button>
        </div>

        <div class="qr-preview-section">
            <div class="qr-preview-box" id="qr-preview-container">
                <div style="text-align: center; color: var(--text-muted);">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom: 1rem;"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><rect x="7" y="7" width="3" height="3"></rect><rect x="14" y="7" width="3" height="3"></rect><rect x="7" y="14" width="3" height="3"></rect><rect x="14" y="14" width="3" height="3"></rect></svg>
                    <p style="margin:0; font-size: 0.9rem;">Enter details to see preview.</p>
                </div>
            </div>
            
            <div class="qr-controls" style="display: none;" id="qr-result-controls">
                <button class="btn btn-secondary btn-sm" onclick="downloadQr('png')">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 6px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    PNG
                </button>
                <button class="btn btn-secondary btn-sm" onclick="downloadQr('svg')">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 6px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    SVG
                </button>
                <button class="btn btn-secondary btn-sm" onclick="copyQr(this)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 6px;"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    Copy
                </button>
            </div>
        </div>
    </div>

    <script>
        function switchQrType(type) {
            document.querySelectorAll('.qr-fields-container').forEach(el => el.classList.remove('active'));
            document.getElementById('fields-' + type).classList.add('active');
        }

        async function generateQrCode(btn) {
            const type = document.getElementById('qr-type').value;
            const container = document.getElementById('qr-preview-container');
            const controls = document.getElementById('qr-result-controls');
            
            // Validate input
            let data = {};
            if(type === 'text') {
                data.text = document.getElementById('qr-text').value;
                if(!data.text) return typeof showErrorPanel === 'function' ? showErrorPanel('Validation', 'Please enter some text.') : alert('Please enter some text');
            } else if(type === 'url') {
                data.url = document.getElementById('qr-url').value;
                if(!data.url) return typeof showErrorPanel === 'function' ? showErrorPanel('Validation', 'Please enter a URL.') : alert('Please enter a URL');
            } else if(type === 'wifi') {
                data.ssid = document.getElementById('qr-wifi-ssid').value;
                data.password = document.getElementById('qr-wifi-password').value;
                if(!data.ssid) return typeof showErrorPanel === 'function' ? showErrorPanel('Validation', 'Please enter a WiFi network name.') : alert('Please enter a WiFi network name');
            } else if(type === 'contact') {
                data.name = document.getElementById('qr-contact-name').value;
                if(!data.name) return typeof showErrorPanel === 'function' ? showErrorPanel('Validation', 'Please enter a contact name.') : alert('Please enter a contact name');
            }

            if (typeof setButtonLoading === 'function') setButtonLoading(btn, true);
            else { btn.disabled = true; btn.innerHTML = 'Generating...'; }
            
            container.innerHTML = '<div class="loader-container"><div class="loader"></div></div>';
            controls.style.display = 'none';

            // Simulate API request
            setTimeout(() => {
                container.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 24 24" fill="var(--text-color)" style="filter: drop-shadow(0 0 10px rgba(0, 255, 213, 0.2));">
                        <rect x="2" y="2" width="20" height="20" fill="white" rx="1"/>
                        <path fill="black" d="M4 4h6v6H4V4zm2 2v2h2V6H6zm10-2h6v6h-6V4zm2 2v2h2V6h-2zM4 14h6v6H4v-6zm2 2v2h2v-2H6zm6-12h2v2h-2V4zm0 4h2v2h-2V8zm0 4h2v2h-2v-2zm-2 2h2v2h-2v-2zm-2 2h2v2h-2v-2zm6-4h2v2h-2v-2zm2 2h2v2h-2v-2zm0 4h2v2h-2v-2zm-6 0h2v2h-2v-2z"/>
                    </svg>
                `;
                controls.style.display = 'flex';
                
                if (typeof setButtonLoading === 'function') setButtonLoading(btn, false);
                else { btn.disabled = false; btn.innerHTML = 'Generate QR Code'; }
                
                const resultBox = document.querySelector('.result-box');
                if(resultBox) {
                    resultBox.innerHTML = `
                        <div style="text-align: center; width: 100%;">
                            <p style="color: var(--primary-color); margin-bottom: 1rem; font-weight: 600;">Generated Successfully!</p>
                            <pre class="code-block" style="text-align: left; background: var(--bg-color); padding: 1rem; border-radius: 4px; font-size: 0.85rem; border: 1px solid var(--border-color); overflow-x: auto;">
{
  "status": "success",
  "data": {
    "type": "${type}",
    "format": "png",
    "size": 512,
    "url": "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAA..."
  }
}
                            </pre>
                        </div>
                    `;
                }
            }, 800);
        }

        function downloadQr(format) {
            if (typeof triggerDownload === 'function') {
                triggerDownload('Fake QR Code Data', format, 'qrcode', null);
            } else {
                alert('Downloading QR Code as ' + format.toUpperCase());
            }
        }

        function copyQr(btn) {
            if (typeof showCopySuccess === 'function') {
                showCopySuccess(btn, true);
            } else {
                alert('QR Code Copied!');
            }
        }
    </script>
</div>
