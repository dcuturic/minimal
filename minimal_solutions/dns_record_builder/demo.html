<div class="dns-container" style="width: 100%;">
    <style>
        .dns-input-group { margin-bottom: 1.5rem; }
        .dns-input-group label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem; }
        .dns-input { width: 100%; padding: 0.75rem; background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 4px; color: var(--text-color); font-family: inherit; font-size: 1rem; }
        .dns-input:focus { outline: none; border-color: var(--primary-color); }
        .dns-select { width: 100%; padding: 0.75rem; background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 4px; color: var(--text-color); font-family: inherit; font-size: 1rem; appearance: auto; }
        .dns-select:focus { outline: none; border-color: var(--primary-color); }
        
        .dns-preview-box {
            background: var(--surface-color);
            border: 1px dashed var(--border-color);
            border-radius: 8px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 250px;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .dns-result-text {
            color: var(--text-color);
            white-space: pre-wrap;
            word-break: break-all;
            width: 100%;
            text-align: left;
            line-height: 1.5;
            font-family: monospace;
            background: var(--bg-color);
            padding: 1rem;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }

        .dns-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        @media (max-width: 768px) { .dns-grid { grid-template-columns: 1fr; } }
    </style>

    <div class="dns-grid">
        <div class="dns-form-section">
            <div class="dns-input-group">
                <label>Record Type</label>
                <select id="dns-type" class="dns-select">
                    <option value="A">A</option>
                    <option value="AAAA">AAAA</option>
                    <option value="CNAME">CNAME</option>
                    <option value="MX">MX</option>
                    <option value="TXT">TXT</option>
                    <option value="NS">NS</option>
                </select>
            </div>
            
            <div class="dns-input-group">
                <label>Name</label>
                <input type="text" id="dns-name" class="dns-input" placeholder="@ or subdomain (e.g. www)">
            </div>
            
            <div class="dns-input-group">
                <label>Value / Content</label>
                <input type="text" id="dns-value" class="dns-input" placeholder="e.g. 192.168.1.1">
            </div>

            <div class="dns-input-group">
                <label>TTL (Seconds)</label>
                <input type="number" id="dns-ttl" class="dns-input" placeholder="3600" value="3600">
            </div>

            <button class="btn btn-primary" style="width: 100%; margin-top: 1rem;" onclick="generateRecord(this)">
                Build DNS Record
            </button>
            <div id="dns-error-state" style="display:none; color: var(--error-color, #ff4d4d); margin-top: 1rem; font-size: 0.9rem;"></div>
        </div>

        <div class="dns-preview-section">
            <div class="dns-preview-box" id="dns-preview-container">
                <div style="text-align: center; color: var(--text-muted);" id="dns-empty-state">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom: 1rem;"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
                    <p style="margin:0; font-size: 0.9rem;">Enter DNS details to generate record JSON.</p>
                </div>
                
                <div id="dns-result-state" style="display: none; width: 100%;">
                    <div style="display: flex; justify-content: flex-end; margin-bottom: 0.5rem;">
                        <button class="btn btn-secondary btn-sm" onclick="copyDnsJson(this)">Copy JSON</button>
                    </div>
                    <pre class="dns-result-text" id="dns-result"></pre>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function generateRecord(btn) {
            const type = document.getElementById('dns-type').value;
            const name = document.getElementById('dns-name').value;
            const value = document.getElementById('dns-value').value;
            const ttl = document.getElementById('dns-ttl').value;
            
            const container = document.getElementById('dns-preview-container');
            const emptyState = document.getElementById('dns-empty-state');
            const resultState = document.getElementById('dns-result-state');
            const errorState = document.getElementById('dns-error-state');
            
            // Hide previous errors in local state
            if (errorState) errorState.style.display = 'none';

            // Validation Error-State
            if (!name || name.trim() === '') {
                if (typeof showErrorPanel === 'function') {
                    showErrorPanel('Validation Error', 'Please provide a Record Name.');
                } else if (errorState) {
                    errorState.innerText = 'Please provide a Record Name.';
                    errorState.style.display = 'block';
                }
                return;
            }
            if (!value || value.trim() === '') {
                if (typeof showErrorPanel === 'function') {
                    showErrorPanel('Validation Error', 'Please provide a Record Value.');
                } else if (errorState) {
                    errorState.innerText = 'Please provide a Record Value.';
                    errorState.style.display = 'block';
                }
                return;
            }

            if (typeof setButtonLoading === 'function') setButtonLoading(btn, true);
            else { btn.disabled = true; btn.innerHTML = 'Building...'; }
            
            emptyState.style.display = 'none';
            resultState.style.display = 'none';

            // Loading-State
            const loaderDiv = document.createElement('div');
            loaderDiv.className = 'loader-container';
            loaderDiv.id = 'dns-temp-loader';
            loaderDiv.innerHTML = '<div class="loader"></div>';
            container.appendChild(loaderDiv);

            try {
                // Call API
                const response = await fetch('/api/minimal-solutions/dns_record_builder', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        type: type,
                        name: name,
                        value: value,
                        ttl: parseInt(ttl) || 3600
                    })
                });
                
                const result = await response.json();

                const loader = document.getElementById('dns-temp-loader');
                if (loader) loader.remove();

                if (!response.ok || result.status === 'error') {
                    if (typeof showErrorPanel === 'function') {
                        showErrorPanel('API Error', result.message || 'Unknown error occurred.');
                    } else if (errorState) {
                        errorState.innerText = result.message || 'Unknown error occurred.';
                        errorState.style.display = 'block';
                    }
                    if (typeof setButtonLoading === 'function') setButtonLoading(btn, false);
                    else { btn.disabled = false; btn.innerHTML = 'Build DNS Record'; }
                    emptyState.style.display = 'flex';
                    return;
                }

                // Update UI Result-State
                document.getElementById('dns-result').textContent = JSON.stringify(result.data || result, null, 2);
                
                resultState.style.display = 'block';
                
                if (typeof setButtonLoading === 'function') setButtonLoading(btn, false);
                else { btn.disabled = false; btn.innerHTML = 'Build DNS Record'; }

                const resultBox = document.querySelector('.result-box');
                if(resultBox) {
                    resultBox.innerHTML = `
                        <div style="text-align: center; width: 100%;">
                            <p style="color: var(--primary-color); margin-bottom: 1rem; font-weight: 600;">Generated Successfully!</p>
                            <pre class="code-block" style="text-align: left; background: var(--bg-color); padding: 1rem; border-radius: 4px; font-size: 0.85rem; border: 1px solid var(--border-color); overflow-x: auto;">
${JSON.stringify(result, null, 2)}
                            </pre>
                        </div>
                    `;
                }
                
            } catch (err) {
                const loader = document.getElementById('dns-temp-loader');
                if (loader) loader.remove();

                if (typeof showErrorPanel === 'function') {
                    showErrorPanel('Network Error', 'Failed to connect to the API.');
                } else if (errorState) {
                    errorState.innerText = 'Failed to connect to the API.';
                    errorState.style.display = 'block';
                }
                if (typeof setButtonLoading === 'function') setButtonLoading(btn, false);
                else { btn.disabled = false; btn.innerHTML = 'Build DNS Record'; }
                emptyState.style.display = 'flex';
            }
        }

        async function copyDnsJson(btn) {
            const textContent = document.getElementById('dns-result').textContent;
            try {
                await navigator.clipboard.writeText(textContent);
                if (typeof showCopySuccess === 'function') {
                    showCopySuccess(btn, true);
                } else {
                    const originalText = btn.innerHTML;
                    btn.innerHTML = 'Copied!';
                    setTimeout(() => { btn.innerHTML = originalText; }, 2000);
                }
            } catch (err) {
                console.error('Failed to copy text: ', err);
                if (typeof showErrorPanel === 'function') {
                    showErrorPanel('Copy Error', 'Failed to copy text.');
                } else {
                    btn.innerHTML = 'Error';
                    setTimeout(() => { btn.innerHTML = 'Copy JSON'; }, 2000);
                }
            }
        }
    </script>
</div>
